# Protocol Config — Savant-Code (savant-free) configuration for ECHO Protocol v0.1.3
#
# This file configures the ECHO Protocol (scaffolded at ./protocol/) for the
# Savant-Code monorepo. Language: typescript. Runtime: bun 1.3.x.
#
# All paths are anchored at the repository root (NOT at protocol/).
# The runtime state (FIDs, session summaries, LEARNINGS) lives at ./dev/.

project:
  name: "savant-code"
  description: "Public, free coding agent built from the Savant-Code agent framework (savant-free monorepo)."
  version: "1.0.0"

protocol:
  version: "0.1.3"
  strict_mode: true  # true = all 15 laws active (default), false = core 4 laws only

language: "typescript"

commands:
  build: "bun run build:sdk && bun run build:savant-free"
  test: "bun test"
  type_check: "bun x tsc --noEmit -p tsconfig.json"
  lint: "bun x eslint . --max-warnings 9999"
  format: "bun x prettier --write ."
  clean: "rm -rf dist tsconfig.tsbuildinfo && find . -name node_modules -prune -o -name '*.tsbuildinfo' -print -delete"

paths:
  src: "cli/src sdk/src common/src packages packages/agent-runtime/src packages/code-map/src packages/llm-providers/src"
  tests: "cli/ src/ packages/ sdk/ common/"
  docs: "docs/"
  dev: "dev/"
  fids: "dev/fids/"
  fids_archive: "dev/fids/archive/"
  session_summaries: "dev/session-summaries/"
  learnings: "dev/LEARNINGS.md"
  protocol_root: "protocol/"

quality:
  # TypeScript coding-standards overrides (see protocol/coding-standards/typescript.md)
  max_file_lines: 400       # TS override (default 300) — React/service files tend to be longer
  max_function_lines: 60    # TS override (default 50) — component render logic can be slightly longer
  max_line_length: 100      # matches TS standard
  max_complexity: 10
  max_params: 4
  max_comment_density: 0.33
  max_nesting_depth: 3

# Naming rules: see protocol/coding-standards/typescript.md

testing:
  fuzz_enabled: false
  mutation_enabled: false
  coverage_threshold: 80
  test_timeout: 30
  parallel_tests: true

fid:
  auto_create: true
  severity_levels: ["critical", "high", "medium", "low"]
  max_open_fids: 20

perfection_loop:
  max_iterations: 10
  change_threshold: 0.10
  convergence_threshold: 0.02
  convergence_passes: 2
  oscillation_limit: 3

session:
  auto_summary: true
  summary_interval: 30
  max_session_hours: 4
  autonomy_level: 3  # 1=Guided, 2=Supervised, 3=Autonomous (default)
